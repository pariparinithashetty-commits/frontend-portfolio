<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | PARINITHA SHETTY </title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 152, 248, 0.3);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(56, 189, 248, 0.05) 0%, transparent 20%);
            color: var(--text-main);
            margin: 0;
            padding: 4rem 1rem;
            line-height: 1.6;
        }

        .wrapper { max-width: 1000px; margin: 0 auto; }

        /* --- Elegant Profile Section --- */
        .profile {
            text-align: center;
            margin-bottom: 5rem;
        }

        .img-container {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--glass-border);
            padding: 5px;
            background: linear-gradient(var(--bg), var(--bg)) padding-box,
                        linear-gradient(135deg, var(--accent), transparent) border-box;
        }

        .profile h1 {
            font-size: clamp(2rem, 5vw, 3.5rem); /* Responsive font size for longer names */
            font-weight: 700;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .profile p { color: var(--accent); font-weight: 300; font-size: 1.1rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 0.5rem; }

        /* --- Certificate Section --- */
        .section-header { text-align: left; margin-bottom: 2rem; border-left: 3px solid var(--accent); padding-left: 1rem; }
        
        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 2rem;
            margin-bottom: 6rem;
        }

        .cert-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1rem;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cert-card:hover {
            border-color: var(--accent);
            box-shadow: 0 10px 30px -10px var(--accent-glow);
            transform: translateY(-8px);
        }

        .cert-img {
            width: 100%;
            border-radius: 12px;
            aspect-ratio: 4/3;
            object-fit: cover;
            margin-bottom: 1rem;
            filter: grayscale(20%);
        }

        .cert-card h4 { font-weight: 600; font-size: 1rem; margin: 0; color: var(--text-main); }

        /* --- Contact Form Section --- */
        .contact-container {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 4rem;
            align-items: center;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 30px;
        }

        .contact-info h2 { font-size: 2.2rem; margin-bottom: 1rem; }
        .contact-info p { color: var(--text-dim); }

        .form-group { margin-bottom: 1.5rem; }
        
        input, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 1rem;
            border-radius: 12px;
            color: #fff;
            font-family: 'Outfit';
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            box-shadow: 0 0 20px var(--accent-glow);
            transform: scale(1.02);
        }

        #status { margin-top: 1rem; text-align: center; font-weight: 400; }

        @media (max-width: 768px) {
            .contact-container { grid-template-columns: 1fr; padding: 2rem; }
            .profile h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    
    <header class="profile">
        <div class="img-container">
            <img src="WhatsApp Image 2026-03-23 at 6.08.43 PM.jpeg"alt="PARINITHA SHETTY" class="profile-img">
        </div>
        <h1>RAGHAVENDRA TRIPATHI</h1>
        <p>Full-Stack Developer</p>
    </header>

    <div class="section-header">
        <h3 style="margin:0; text-transform: uppercase; letter-spacing: 1px;">Certifications</h3>
    </div>
    
    <div class="cert-grid">
        <div class="cert-card">
            <img src="JAVA.jpeg" alt="Certificate" class="cert-img">
            <h4>JAVA SCRIPT</h4>
        </div>
        <div class="cert-card">
            <img src="FRONT.jpeg" alt="Certificate" class="cert-img">
            <h4>FRONTEND DEVELOPER</h4>
        </div>
        <div class="cert-card">
            <img src="AWS.jpeg" alt="Certificate" class="cert-img">
            <h4>AWS CLOUD FOUNDATION</h4>
        </div>
        <div class="cert-card">
            <img src="GIT.jpeg" alt="Certificate" class="cert-img">
            <h4>GIT GITHUB</h4>
        </div>
    </div>

    <div class="contact-container">
        <div class="contact-info">
            <h2>Let's Talk.</h2>
            <p>I am always open to discussing new projects, creative ideas, or opportunities to be part of your vision.</p>
        </div>

        <form id="portfolioForm">
            <div class="form-group">
                <input type="text" id="name" placeholder="Name" required>
            </div>
            <div class="form-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <textarea id="message" placeholder="Message" rows="4" required></textarea>
            </div>
            <button type="submit" id="submitBtn">Send Message</button>
            <div id="status"></div>
        </form>
    </div>

</div>

<script>
    // Replace these with your actual Supabase credentials
    const SUPABASE_URL = 'https://oeilcewepwkuhaldzxqs.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9laWxjZXdlcHdrdWhhbGR6eHFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwMjg4MDksImV4cCI6MjA4NzYwNDgwOX0.h_bYJnUYYt6L2sUIntgdN4O6-X4YCcBvj8bRVA8Fak0';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const form = document.getElementById('portfolioForm');
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Processing...";

        const { error } = await _supabase.from('feedback').insert([{
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            message: document.getElementById('message').value
        }]);

        btn.disabled = false;
        btn.innerText = "Send Message";

        if (error) {
            status.style.color = "#ff4d4d";
            status.innerText = "Error encountered. Try again.";
        } else {
            status.style.color = "#38bdf8";
            status.innerText = "Message delivered gracefully.";
            form.reset();
            setTimeout(() => { status.innerText = ""; }, 5000);
        }
    });
</script>

</body>
</html>
